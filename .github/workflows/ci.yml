name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Validate examples
        run: npm run validate

      - name: Public safety scan
        run: npm run scan

      - name: Workflow summary
        run: npm run summary

      - name: Evaluation
        run: npm run eval

      - name: Regression
        run: npm run regression

      - name: Quality gate
        run: npm run gate

      - name: Report
        run: npm run report

      - name: Test
        run: npm run test

      - name: Smoke test
        run: npm run smoke
