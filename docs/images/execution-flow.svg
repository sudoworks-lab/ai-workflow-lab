<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="520" viewBox="0 0 1180 520" role="img" aria-labelledby="title desc">
  <title id="title">AI依頼からレポート生成までの処理フロー</title>
  <desc id="desc">AIへの依頼と結果の記録から、形式確認、公開リスク確認、評価、差分確認、レビュー判定、Markdown レポート生成までの処理フロー。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155" />
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .step { fill: #ffffff; stroke: #64748b; stroke-width: 1.8; rx: 8; }
      .gate { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .evidence { fill: #f3fbf6; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .info { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 8; }
      .label { font-family: Arial, sans-serif; font-size: 15px; fill: #0f172a; font-weight: 700; }
      .small { font-family: Arial, sans-serif; font-size: 12px; fill: #475569; }
      .arrow { stroke: #334155; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="520" />

  <rect class="step" x="30" y="72" width="145" height="78" />
  <text class="label" x="54" y="104">AIへの依頼と結果</text>
  <text class="label" x="77" y="124">の記録</text>
  <text class="small" x="42" y="142">依頼文 / 実行記録 / レビュー結果</text>

  <rect class="step" x="195" y="72" width="145" height="78" />
  <text class="label" x="223" y="104">JSON形式の</text>
  <text class="label" x="252" y="124">確認</text>
  <text class="small" x="224" y="142">schemas と照合</text>

  <rect class="step" x="360" y="72" width="145" height="78" />
  <text class="label" x="389" y="104">公開リスクの</text>
  <text class="label" x="417" y="124">検出</text>
  <text class="small" x="388" y="142">危険語と公開前観点</text>

  <rect class="step" x="525" y="72" width="145" height="78" />
  <text class="label" x="553" y="104">想定ケースとの</text>
  <text class="label" x="582" y="124">比較</text>
  <text class="small" x="551" y="142">想定ケース / 注意ケース</text>

  <rect class="step" x="690" y="72" width="145" height="78" />
  <text class="label" x="718" y="104">前回結果との</text>
  <text class="label" x="734" y="124">差分確認</text>
  <text class="small" x="723" y="142">baseline と比較</text>

  <path class="arrow" d="M175 111 L190 111" />
  <path class="arrow" d="M340 111 L355 111" />
  <path class="arrow" d="M505 111 L520 111" />
  <path class="arrow" d="M670 111 L685 111" />

  <path class="arrow" d="M835 111 C905 111 910 216 845 216" />

  <rect class="gate" x="690" y="177" width="145" height="78" />
  <text class="label" x="710" y="209">人間レビュー</text>
  <text class="label" x="726" y="229">要否の判定</text>
  <text class="small" x="723" y="247">通過 / 要レビュー</text>

  <rect class="evidence" x="525" y="177" width="145" height="78" />
  <text class="label" x="543" y="209">Markdown</text>
  <text class="label" x="549" y="229">レポート生成</text>
  <text class="small" x="552" y="247">reports/latest.md</text>

  <rect class="info" x="360" y="177" width="145" height="78" />
  <text class="label" x="395" y="209">証跡の整理</text>
  <text class="small" x="382" y="229">summary / eval / regression</text>
  <text class="small" x="406" y="247">artifacts/latest/</text>

  <rect class="step" x="195" y="177" width="145" height="78" />
  <text class="label" x="232" y="209">目視確認と</text>
  <text class="label" x="238" y="229">次の対応</text>
  <text class="small" x="220" y="247">公開判断は人間が担当</text>

  <path class="arrow" d="M690 216 L675 216" />
  <path class="arrow" d="M525 216 L510 216" />
  <path class="arrow" d="M360 216 L345 216" />

  <text class="small" x="196" y="330">`run-all` はこの流れの後に test と smoke も実行</text>
  <text class="small" x="196" y="354">図は AI への依頼記録から Markdown レポート生成までの主処理を示す</text>
</svg>
